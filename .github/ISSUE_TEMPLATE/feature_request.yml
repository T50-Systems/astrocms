name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Clear problem statements help maintainers evaluate scope and priority.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
      placeholder: Describe the pain point or opportunity.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds did you consider?
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact and compatibility
      description: Note migrations, breaking changes, performance/security implications, or affected users.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checklist
      options:
        - label: I searched for existing issues and pull requests.
          required: true
        - label: I can help test or validate this change.
          required: false
