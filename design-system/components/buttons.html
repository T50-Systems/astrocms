<!doctype html><html><head><meta charset="utf-8"><title>Button</title><style>
*{box-sizing:border-box;margin:0}
:root{--radius:.625rem;--foreground:oklch(.145 0 0);--muted-foreground:oklch(.556 0 0);--primary:oklch(.53 .12 250);--primary-foreground:oklch(.985 0 0);--secondary:oklch(.97 0 0);--secondary-foreground:oklch(.205 0 0);--accent:oklch(.97 0 0);--accent-foreground:oklch(.205 0 0);--destructive:oklch(.577 .245 27.325);--destructive-foreground:oklch(.985 0 0);--border:oklch(.922 0 0);--input:oklch(.922 0 0);--background:#fff}
body{font-family:system-ui,sans-serif;color:var(--foreground);background:#fff;padding:24px}
h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground);margin:0 0 10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;border-radius:calc(var(--radius) - 2px);font-size:14px;font-weight:500;height:36px;padding:0 16px;border:1px solid transparent;cursor:pointer;background:var(--primary);color:var(--primary-foreground)}
.btn:hover{filter:brightness(.95)}
.destructive{background:var(--destructive);color:var(--destructive-foreground)}
.outline{background:var(--background);color:var(--foreground);border-color:var(--input)}
.outline:hover{background:var(--accent)}
.secondary{background:var(--secondary);color:var(--secondary-foreground)}
.ghost{background:transparent;color:var(--foreground)}
.ghost:hover{background:var(--accent)}
.link{background:transparent;color:var(--primary);text-decoration:underline;text-underline-offset:4px;border:0;padding:0;height:auto}
.sm{height:32px;padding:0 12px;font-size:12px}
.lg{height:40px;padding:0 24px}
.icon{width:36px;padding:0}
.btn:disabled{opacity:.5;pointer-events:none}
.focus{outline:2px solid var(--ring,var(--primary));outline-offset:1px}
.lbl{font-size:11px;color:var(--muted-foreground);font-family:ui-monospace,monospace;width:100%}
</style></head><body>
<h2>Variantes (cva)</h2>
<div class="row">
  <button class="btn">default</button>
  <button class="btn destructive">destructive</button>
  <button class="btn outline">outline</button>
  <button class="btn secondary">secondary</button>
  <button class="btn ghost">ghost</button>
  <button class="btn link">link</button>
</div>
<h2>Tamaños</h2>
<div class="row">
  <button class="btn sm">sm · h-8</button>
  <button class="btn">default · h-9</button>
  <button class="btn lg">lg · h-10</button>
  <button class="btn icon" aria-label="icono">✕</button>
  <span class="lbl">size="icon" · 36×36, iconos lucide size-4</span>
</div>
<h2>Estados</h2>
<div class="row">
  <button class="btn" disabled>disabled · opacity-50</button>
  <button class="btn focus">focus-visible · ring-2 ring-ring</button>
  <button class="btn outline" style="color:var(--destructive)">outline text-destructive · acción peligrosa secundaria</button>
</div>
<p class="lbl">Uso: default=acción principal (1 por vista) · outline=secundaria · ghost=terciaria/Cancelar · destructive=eliminar confirmado. Botones de texto en celdas: &lt;button class="text-primary hover:underline"&gt; (no el componente).</p>
</body></html>
